<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#001f3f" stroke-width="4"/>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="#ffffff"/>
  
  <!-- Water wave at bottom -->
  <path d="M 20 130 Q 40 120, 60 130 T 100 130 T 140 130 T 180 130 L 180 170 L 20 170 Z" fill="#001f3f" opacity="0.8"/>
  
  <!-- Mountains/Temple silhouette -->
  <path d="M 90 70 L 110 50 L 130 70 L 140 60 L 150 80 Z" fill="#2c3e50" opacity="0.9"/>
  <circle cx="120" cy="75" r="8" fill="#b8860b" opacity="0.7"/>
  
  <!-- Palm tree -->
  <line x1="40" y1="100" x2="40" y2="120" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="35" cy="85" r="6" fill="#2ecc71"/>
  <circle cx="45" cy="85" r="6" fill="#2ecc71"/>
  <circle cx="40" cy="75" r="6" fill="#2ecc71"/>
  
  <!-- Airplane -->
  <g transform="translate(70, 50)">
    <line x1="0" y1="0" x2="15" y2="0" stroke="#001f3f" stroke-width="2"/>
    <polygon points="15,0 12,-3 12,3" fill="#001f3f"/>
    <circle cx="5" cy="0" r="2" fill="#001f3f"/>
  </g>
  
  <!-- Japan flag -->
  <rect x="25" y="35" width="25" height="18" fill="white" stroke="#001f3f" stroke-width="1"/>
  <circle cx="37.5" cy="44" r="6" fill="#dc143c"/>
  
  <!-- Sri Lanka flag -->
  <rect x="150" y="35" width="25" height="18" fill="#1e90ff" stroke="#001f3f" stroke-width="1"/>
  <rect x="155" y="35" width="6" height="18" fill="#cd5c5c"/>
  <circle cx="165" cy="44" r="5" fill="#ffd700"/>
  
  <!-- Text "JapLan Tours" at bottom -->
  <text x="100" y="155" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">
    JapLan Tours
  </text>
</svg>